steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/election-assistant:latest'
      - './backend'
    dir: '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - 'deploy'
      - 'election-assistant'
      - '--image'
      - 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--max-instances'
      - '100'

# Push the image to container registry
images:
  - 'gcr.io/$PROJECT_ID/election-assistant:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/election-assistant:latest'

# Substitutions (override with --substitutions flag)
substitutions:
  _GEMINI_API_KEY: 'YOUR_GEMINI_API_KEY'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'

timeout: '3600s'
